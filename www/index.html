<!DOCTYPE html>
<html>
<head>
    <title>WebServ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0a0c10;
            --surface:   #111418;
            --border:    #1e2530;
            --border-hi: #2e3d50;
            --text:      #c9d6e3;
            --muted:     #4a5a6a;
            --accent:    #00e5ff;
            --accent-dim:#004d5e;
            --danger:    #ff3b5c;
            --danger-dim:#3a0b14;
            --success:   #00e5a0;
            --mono:      'Space Mono', monospace;
            --sans:      'Syne', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            padding: 48px 24px;
            overflow-x: hidden;
        }

        /* Ambient glow background */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(0,229,255,0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            max-width: 720px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* ── Header ── */
        header {
            margin-bottom: 56px;
            display: flex;
            align-items: flex-end;
            gap: 16px;
        }

        .logo-mark {
            width: 40px;
            height: 40px;
            border: 2px solid var(--accent);
            display: grid;
            place-items: center;
            flex-shrink: 0;
            animation: pulse-border 3s ease-in-out infinite;
        }

        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0,229,255,0.3); }
            50%       { box-shadow: 0 0 0 8px rgba(0,229,255,0); }
        }

        .logo-mark svg { width: 20px; height: 20px; }

        h1 {
            font-family: var(--sans);
            font-weight: 800;
            font-size: clamp(2rem, 5vw, 3rem);
            letter-spacing: -0.03em;
            color: #fff;
            line-height: 1;
        }

        h1 span { color: var(--accent); }

        .subtitle {
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-left: 2px;
            margin-bottom: 4px;
        }

        /* ── Cards ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 32px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 3px; height: 100%;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .card:hover { border-color: var(--border-hi); }
        .card:hover::before { opacity: 1; }

        .card-danger::before { background: var(--danger); }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .method-badge {
            font-family: var(--mono);
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            padding: 4px 10px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .badge-get     { background: rgba(0,229,255,0.12); color: var(--accent); border: 1px solid rgba(0,229,255,0.25); }
        .badge-post    { background: rgba(0,229,160,0.12); color: var(--success); border: 1px solid rgba(0,229,160,0.25); }
        .badge-delete  { background: rgba(255,59,92,0.12); color: var(--danger);  border: 1px solid rgba(255,59,92,0.25); }

        .card-title {
            font-weight: 600;
            font-size: 1rem;
            color: #fff;
            letter-spacing: -0.01em;
        }

        .card-num {
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--muted);
            margin-left: auto;
        }

        .card p {
            font-size: 0.875rem;
            color: var(--muted);
            line-height: 1.7;
            margin-bottom: 20px;
        }

        code {
            font-family: var(--mono);
            font-size: 0.8em;
            background: rgba(0,229,255,0.08);
            color: var(--accent);
            padding: 2px 7px;
            border-radius: 2px;
        }

        /* ── Image preview ── */
        .img-frame {
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 16px;
            background: rgba(0,0,0,0.3);
            display: inline-block;
        }

        .img-frame img {
            display: block;
            max-width: 200px;
            height: auto;
        }

        /* ── File upload ── */
        .upload-zone {
            border: 1px dashed var(--border-hi);
            border-radius: 2px;
            padding: 28px;
            text-align: center;
            position: relative;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            margin-bottom: 16px;
        }

        .upload-zone:hover {
            border-color: var(--accent);
            background: rgba(0,229,255,0.03);
        }

        .upload-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .upload-icon {
            margin-bottom: 10px;
            opacity: 0.5;
        }

        .upload-label {
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 0.05em;
        }

        .file-name {
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--accent);
            margin-top: 8px;
            min-height: 1em;
        }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: var(--mono);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 12px 24px;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
        }

        .btn:active { transform: scale(0.97); }

        .btn-primary {
            background: var(--accent);
            color: #000;
        }

        .btn-primary:hover { opacity: 0.85; }

        .btn-danger {
            background: var(--danger);
            color: #fff;
        }

        .btn-danger:hover { opacity: 0.85; }

        /* ── Status ── */
        #deleteStatus {
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 14px;
            min-height: 1.2em;
            transition: color 0.2s;
        }

        /* ── Separator ── */
        .scan-line {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-hi), transparent);
            margin: 8px 0 32px;
        }

        /* ── Stagger animation ── */
        .card {
            opacity: 0;
            transform: translateY(16px);
            animation: card-in 0.5s ease forwards;
        }
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.22s; }
        .card:nth-child(3) { animation-delay: 0.34s; }

        @keyframes card-in {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="wrapper">

    <header>
        <div>
            <p class="subtitle">HTTP Server / Testing Interface</p>
            <h1>Web<span>Serv</span></h1>
        </div>
    </header>

    <div class="scan-line"></div>

    <!-- GET -->
    <div class="card">
        <div class="card-header">
            <span class="method-badge badge-get">GET</span>
            <span class="card-title">Static File Test</span>
            <span class="card-num">01</span>
        </div>
        <p>If the image renders below, static file serving is working correctly.</p>
        <div class="img-frame">
            <img src="media/imag.png" alt="Image Not Found">
        </div>
    </div>

    <!-- POST -->
    <div class="card">
        <div class="card-header">
            <span class="method-badge badge-post">POST</span>
            <span class="card-title">Raw File Upload</span>
            <span class="card-num">02</span>
        </div>
        <p>Select a file and upload it raw to <code>/upload</code>. The filename is sent as a request header.</p>

        <div class="upload-zone" id="uploadZone">
            <input type="file" id="fileInput" onchange="updateFileName(this)">
            <div class="upload-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
            </div>
            <div class="upload-label">Click or drag a file here</div>
            <div class="file-name" id="fileName"></div>
        </div>

        <button class="btn btn-primary" onclick="uploadRaw()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            Upload
        </button>
    </div>

    <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
        <input 
            type="text" 
            id="deleteTarget" 
            placeholder="filename.txt"
            style="
                font-family: var(--mono);
                font-size: 0.75rem;
                background: var(--bg);
                border: 1px solid var(--border-hi);
                color: var(--text);
                padding: 12px 16px;
                border-radius: 2px;
                outline: none;
                width: 220px;
                transition: border-color 0.2s;
            "
            onfocus="this.style.borderColor='var(--danger)'"
            onblur="this.style.borderColor='var(--border-hi)'"
        >
        <button class="btn btn-danger" onclick="sendDelete()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/>
            </svg>
            Delete File
        </button>
    </div>
</div>

<!-- POST script — logic unchanged -->
<script>
    function updateFileName(input) {
        const label = document.getElementById('fileName');
        label.textContent = input.files[0] ? '→ ' + input.files[0].name : '';
    }

    async function uploadRaw()
    {
        const input = document.getElementById('fileInput');
        if (!input.files[0]) return alert("Select a file!");
        
        const file = input.files[0];
        const response = await fetch('/upload', {
            method: 'POST',
            headers: {
                'filename': file.name,
                'Content-Type': file.type
            },
            body: file 
        });

        // If server returns 4xx or 5xx, force the browser to show the error HTML
        if (!response.ok) {
            const errorHtml = await response.text();
            document.open();
            document.write(errorHtml);
            document.close();
        } else {
            alert("Upload Successful! (201 Created)");
        }
    }
</script>

</script>

<script>
    async function sendDelete() {
        const target = document.getElementById('deleteTarget').value.trim();
        if (!target) return alert("Enter a filename!");

        const res = await fetch(target, { method: 'DELETE' });
        if (res.status === 204)
            window.location.reload();
        else {
            const errorHtml = await res.text();
            document.open();
            document.write(errorHtml);
            document.close();
        }
    }
</script>

</body>
</html>
